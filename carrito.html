<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Prende el Fueguito</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Logo</a></li>
                <li><a href="#productos">Productos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Carrito de Compras</h1>

        <section id="resumen-carrito">
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Subtotal</th>
                        <th>Eliminar</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <img src="https://via.placeholder.com/80x60" alt="Bife de Chorizo">
                            <span>Bife de Chorizo</span>
                        </td>
                        <td>2 kg</td>
                        <td>$12.990/kg</td>
                        <td>$25.980</td>
                        <td><button>X</button></td>
                    </tr>
                    <tr>
                        <td>
                            <img src="https://via.placeholder.com/80x60" alt="Carbón">
                            <span>Carbón Quebracho</span>
                        </td>
                        <td>3 unidades</td>
                        <td>$3.200</td>
                        <td>$9.600</td>
                        <td><button>X</button></td>
                    </tr>
                </tbody>
            </table>

            <div class="totales">
                <p>Subtotal: $35.580</p>
                <p>Envío: $1.500</p>
                <p><strong>Total: $37.080</strong></p>
            </div>

            <div class="acciones">
                <button>Seguir Comprando</button>
                <a href="checkout.html"><button>Finalizar Compra</button></a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Asado Argentino. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
